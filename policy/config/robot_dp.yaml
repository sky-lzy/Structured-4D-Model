defaults:
  - _self_
  - task: default_task

name: robot_${task.name}
_target_: policy.workspace.robotworkspace.RobotWorkspace

task_name: ${task.name}
shape_meta: ${task.shape_meta}
exp_name: "default"

horizon: 32
n_obs_steps: 2
n_action_steps: 8
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
past_action_visible: False
keypoint_visible_rate: 1.0
obs_as_global_cond: True

dataset:
  task: ''
  data_paths: ''
  chunk_size: 32
  interp_ratio: 1
  inv_dyn: True
  obs_mode: 'pointcloud'
  num_success_demos: 1000
  num_failure_demos: 0

policy:
  _target_: policy.policy.diffusion_unet_image_policy.DiffusionUnetImagePolicy

  shape_meta: ${shape_meta}
  
  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    variance_type: fixed_small # Yilun's paper uses fixed_small_log instead, but easy to cause Nan
    clip_sample: True # required when predict_epsilon=False
    prediction_type: epsilon # or sample

  horizon: ${horizon}
  n_action_steps: ${eval:'${n_action_steps}+${n_latency_steps}'}
  n_obs_steps: ${n_obs_steps}
  obs_mode: ${dataset.obs_mode}
  num_inference_steps: 100
  obs_as_global_cond: ${obs_as_global_cond}
  diffusion_step_embed_dim: 128
  down_dims: [256, 512, 1024]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: True

ema:
  _target_: policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 64
  num_workers: 0
  shuffle: True
  pin_memory: True
  persistent_workers: False

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: "cuda:0"
  seed: 42
  debug: False
  resume: True
  # optimization
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 20000
  gradient_accumulate_every: 1
  use_ema: True
  freeze_encoder: False
  checkpoint_every: 5000
  max_train_steps: null

multi_run:
  run_dir: outputs/${name}/${now:%Y%m%d-%H%M%S}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: outputs/${name}/${now:%Y%m%d-%H%M%S}
  sweep:
    dir: outputs/${name}/${now:%Y%m%d-%H%M%S}
    subdir: ${hydra.job.num}
